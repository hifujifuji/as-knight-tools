<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天啟症候群・騎士戰鬥計算機</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f1eb;
            --surface: #ffffff;
            --surface-alt: #e8e4dc;
            --text: #1a1a1a;
            --text-muted: #666;
            --border: #1a1a1a;
            --border-light: #ccc;
            --positive: #2e6e4e;
            --negative: #8a3030;
        }

        :root[data-theme="dark"] {
            --bg: #1c1a17;
            --surface: #262320;
            --surface-alt: #2e2b27;
            --text: #e8e4dc;
            --text-muted: #9a958c;
            --border: #e8e4dc;
            --border-light: #45413b;
            --positive: #7fc8a0;
            --negative: #d98f8f;
        }

        body {
            font-family: "Noto Sans TC", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 16px;
            font-size: 14px;
        }

        body::after {
            content: '';
            position: fixed; inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.04; pointer-events: none; z-index: 99999;
        }

        h1 { font-size: 18px; letter-spacing: 2px; }

        /* ===== 頂列：設定檔 ===== */
        .topbar {
            display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 12px 16px;
            margin-bottom: 14px;
        }
        .topbar .spacer { flex: 1; }

        select, input[type="text"], input[type="number"] {
            padding: 5px 8px;
            border: 1px solid var(--border-light);
            background: var(--surface);
            color: var(--text);
            font-family: inherit;
            font-size: 13px;
        }
        input[type="number"] { width: 56px; }
        input:focus, select:focus { outline: 2px solid var(--border); outline-offset: -2px; }

        button {
            padding: 5px 12px;
            border: 1px solid var(--border-light);
            background: var(--surface);
            color: var(--text);
            cursor: pointer;
            font-size: 13px;
            font-family: inherit;
        }
        button:hover { background: var(--surface-alt); }
        button.primary { border-color: var(--border); font-weight: 600; }

        /* ===== 主版面 ===== */
        .layout {
            display: grid;
            grid-template-columns: minmax(360px, 5fr) minmax(420px, 6fr);
            gap: 14px;
            align-items: start;
            max-width: 1500px;
            margin: 0 auto;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border-light);
            margin-bottom: 14px;
        }

        .panel-title {
            padding: 10px 14px;
            border-bottom: 1px solid var(--border-light);
            background: var(--surface-alt);
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .panel-body { padding: 12px 14px; }

        details { border-bottom: 1px solid var(--border-light); }
        details:last-child { border-bottom: none; }
        summary {
            padding: 9px 14px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            background: var(--surface);
            list-style: none;
            user-select: none;
        }
        summary::before { content: '▶ '; font-size: 10px; color: var(--text-muted); }
        details[open] > summary::before { content: '▼ '; }
        summary:hover { background: var(--surface-alt); }
        .details-body { padding: 8px 14px 12px; }

        /* ===== 能力值 ===== */
        .ability-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .ability-cell { text-align: center; }
        .ability-cell label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 3px; }
        .ability-cell input { width: 100%; text-align: center; font-size: 16px; font-weight: 600; }

        .select-row {
            display: flex; gap: 14px; flex-wrap: wrap; margin-top: 10px;
            font-size: 13px; align-items: center;
        }
        .select-row label { color: var(--text-muted); }

        /* ===== 效果列表 ===== */
        .effect-item {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border-light);
        }
        .effect-item:last-child { border-bottom: none; }
        .effect-item input[type="checkbox"], .effect-item input[type="radio"] { margin-top: 3px; flex-shrink: 0; }
        .effect-main { flex: 1; min-width: 0; }
        .effect-name { font-weight: 600; font-size: 13px; }
        .effect-meta {
            font-size: 11px; color: var(--text-muted);
            font-family: monospace; margin-left: 6px;
        }
        .effect-desc { font-size: 12px; color: var(--text-muted); margin-top: 2px; line-height: 1.5; white-space: pre-line; }
        .effect-item.builtin { opacity: 1; }
        .effect-item.builtin .effect-name::after { content: ' 〔內建〕'; font-size: 11px; color: var(--positive); font-weight: 400; }
        .effect-tag {
            display: inline-block; font-size: 10px; padding: 0 5px;
            border: 1px solid var(--border-light); color: var(--text-muted);
            margin-left: 6px; vertical-align: 1px;
        }

        .fate-status { font-size: 13px; padding: 6px 14px; background: var(--surface-alt); border-bottom: 1px solid var(--border-light); }
        .fate-status.over { color: var(--negative); font-weight: 700; }

        /* ===== 戰鬥輸出 ===== */
        .output-panel {
            background: var(--surface);
            border: 2px solid var(--border);
            margin-bottom: 14px;
            position: sticky;
            top: 10px;
            z-index: 50;
        }
        .output-main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid var(--border-light);
        }
        .output-block { padding: 14px; text-align: center; }
        .output-block + .output-block { border-left: 1px solid var(--border-light); }
        .output-label { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; }
        .output-value { font-size: 30px; font-weight: 700; font-family: monospace; margin: 4px 0; }
        .output-sub { font-size: 11px; color: var(--text-muted); }
        .copy-btn { margin-top: 6px; font-size: 11px; padding: 3px 10px; }

        .output-stats {
            display: flex; flex-wrap: wrap; gap: 0;
            border-bottom: 1px solid var(--border-light);
        }
        .stat-cell {
            flex: 1; min-width: 70px; text-align: center; padding: 8px 4px;
            border-right: 1px solid var(--border-light);
        }
        .stat-cell:last-child { border-right: none; }
        .stat-cell .v { font-size: 17px; font-weight: 700; font-family: monospace; }
        .stat-cell .k { font-size: 10px; color: var(--text-muted); }

        .breakdown { padding: 8px 14px; font-size: 12px; color: var(--text-muted); line-height: 1.6; }
        .breakdown b { color: var(--text); }
        .breakdown .pos { color: var(--positive); }
        .breakdown .neg { color: var(--negative); }

        .notes-list { padding: 8px 14px; font-size: 12px; line-height: 1.6; border-top: 1px solid var(--border-light); }
        .notes-list li { margin-left: 18px; }
        .notes-list .note-src { font-weight: 600; }

        /* ===== 狀態列表 ===== */
        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2px 14px;
        }
        .status-item {
            display: flex; align-items: center; gap: 6px;
            padding: 4px 0; font-size: 13px;
            position: relative;
        }
        .status-item .s-name { cursor: help; border-bottom: 1px dotted var(--border-light); }
        .status-item .s-name.negative { color: var(--negative); }
        .status-item .s-name.positive { color: var(--positive); }
        .status-item input[type="number"] { width: 44px; padding: 2px 4px; font-size: 12px; }
        .status-tooltip {
            display: none;
            position: absolute; left: 0; top: 100%;
            z-index: 200; width: 280px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 8px 10px; font-size: 12px; line-height: 1.5;
            white-space: pre-line;
            box-shadow: 3px 3px 0 rgba(0,0,0,0.15);
        }
        .status-item:hover .status-tooltip { display: block; }

        /* ===== 回合效果／手動調整 ===== */
        .turn-row {
            display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
            padding: 5px 0; border-bottom: 1px dashed var(--border-light);
            font-size: 13px;
        }
        .turn-row:last-child { border-bottom: none; }
        .turn-row .t-meta { font-size: 11px; color: var(--text-muted); font-family: monospace; }
        .turn-row .t-effect { font-size: 11px; color: var(--positive); font-family: monospace; }
        .turn-row input[type="number"] { width: 50px; padding: 2px 4px; }
        .turn-row select { padding: 2px 4px; font-size: 12px; }

        .manual-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
        }
        .manual-cell label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
        .manual-cell input { width: 100%; }

        .reset-turn-btn { width: 100%; margin-top: 10px; padding: 8px; font-weight: 600; }

        .hint { font-size: 11px; color: var(--text-muted); line-height: 1.5; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--text); }
        ::selection { background: var(--text); color: var(--bg); }

        @media (max-width: 1000px) {
            .layout { grid-template-columns: 1fr; }
            .output-panel { position: static; }
            .status-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <h1>騎士戰鬥計算機</h1>
        <span class="spacer"></span>
        <label>設定檔</label>
        <select id="profileSelect" onchange="switchProfile(this.value)"></select>
        <input type="text" id="charName" placeholder="角色名稱" style="width:130px" oninput="onNameInput(this.value)">
        <button onclick="newProfile()">新增</button>
        <button onclick="duplicateProfile()">複製</button>
        <button onclick="deleteProfile()">刪除</button>
        <button onclick="exportProfiles()">匯出</button>
        <button onclick="importProfiles()">匯入</button>
    </div>

    <div class="layout">
        <!-- ===== 左欄：角色構築 ===== -->
        <div class="col-build">
            <div class="panel">
                <div class="panel-title">能力值與基本設定</div>
                <div class="panel-body">
                    <div class="ability-grid" id="abilityGrid"></div>
                    <div class="select-row">
                        <span><label>命中能力　</label><select id="hitAbilitySel" onchange="setKey('hitAbility', this.value)"></select></span>
                        <span><label>迴避能力　</label><select id="dodgeAbilitySel" onchange="setKey('dodgeAbility', this.value)"></select></span>
                        <span><label>命運點　</label><input type="number" id="fateInput" min="0" onchange="setNum('fate', this.value)"></span>
                        <span><label>行動力　</label><input type="number" id="apInput" min="0" onchange="setNum('ap', this.value)"></span>
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">本質　<span id="essenceStatsLabel" style="font-weight:400;font-size:12px;color:var(--text-muted)"></span></div>
                <div class="panel-body" style="padding-bottom:6px">
                    <select id="essenceSel" onchange="setEssence(this.value)" style="width:100%"></select>
                </div>
                <div id="essenceContent"></div>
            </div>

            <div class="panel">
                <div class="panel-title">型態　<span id="formStatsLabel" style="font-weight:400;font-size:12px;color:var(--text-muted)"></span></div>
                <div class="panel-body" style="padding-bottom:6px">
                    <select id="formSel" onchange="setForm(this.value)" style="width:100%"></select>
                    <div class="select-row">
                        <span><label>傷害能力　</label><select id="dmgAbilitySel" onchange="setKey('dmgAbility', this.value)"></select></span>
                    </div>
                </div>
                <div id="formContent"></div>
            </div>

            <div class="panel">
                <div class="panel-title">戰鬥特技</div>
                <div class="panel-body">
                    <select id="featSel" onchange="setKey('feat', this.value)" style="width:100%"></select>
                    <div class="effect-desc" id="featDesc" style="margin-top:6px"></div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-title">紋章（持有）</div>
                <details>
                    <summary>從紋章表選擇</summary>
                    <div class="details-body" id="emblemOwnList"></div>
                </details>
            </div>
        </div>

        <!-- ===== 右欄：戰鬥面板 ===== -->
        <div class="col-battle">
            <div class="output-panel">
                <div class="output-main">
                    <div class="output-block">
                        <div class="output-label">命中</div>
                        <div class="output-value" id="hitOutput">2D6+0</div>
                        <div class="output-sub" id="hitSub"></div>
                        <button class="copy-btn" onclick="copyOutput('hit', event)">複製</button>
                    </div>
                    <div class="output-block">
                        <div class="output-label">傷害</div>
                        <div class="output-value" id="dmgOutput">1D6+0</div>
                        <div class="output-sub" id="dmgSub"></div>
                        <button class="copy-btn" onclick="copyOutput('dmg', event)">複製</button>
                    </div>
                </div>
                <div class="output-stats" id="statCells"></div>
                <div class="breakdown" id="breakdown"></div>
                <ul class="notes-list" id="notesList" style="display:none"></ul>
            </div>

            <div class="panel">
                <details>
                    <summary>持有效果速查</summary>
                    <div class="details-body" id="ownedSummary"></div>
                </details>
                <details open>
                    <summary>本回合使用的效果</summary>
                    <div class="details-body" id="turnEffects"></div>
                </details>
                <details open>
                    <summary>狀態（自身）</summary>
                    <div class="details-body">
                        <div class="status-grid" id="statusGrid"></div>
                    </div>
                </details>
                <details>
                    <summary>紋章</summary>
                    <div class="details-body" id="emblemList"></div>
                </details>
                <details>
                    <summary>手動調整</summary>
                    <div class="details-body">
                        <div class="manual-grid" id="manualGrid"></div>
                        <div class="hint" style="margin-top:8px">無法自動換算的效果（如獸王當千的每敵加值、炎之魔劍的終極傷害）請使用手動調整。</div>
                    </div>
                </details>
            </div>
            <button class="reset-turn-btn" onclick="resetTurn()">回合結束（清除本回合效果、紋章與手動調整）</button>
        </div>
    </div>

    <script>
        // ============================================================
        // 資料庫：本質
        // 欄位說明：
        //   passive: 持有即生效的數值修正 { hit, dodge, support, dmgDice, dmgFlat, rangeMax, hp }
        //   turn:    本回合勾選使用的效果 { hit, adv, dis, dmgDice, dmgFlat, abilityAdd:[能力選項],
        //            input:{label, mult:'ability'|'dice'|'flat'}, note }
        //   special: 需特殊處理的效果代碼
        //   note:    持有或使用時顯示於結算提醒的文字
        // ============================================================
        const ABILITIES = ['體能', '反應', '心智', '社交'];

        const ESSENCES = {
            '貝西摩斯': {
                hit: 0, dodge: 0, support: -2, hp: 40,
                talents: [
                    { name: '野獸統馭', timing: '非戰鬥', cost: '1 關鍵字', desc: '你可以直覺與動物溝通，理解動物的想法。你可以用這個能力詢問動物問題，但動物會受限於自己的觀點和智力來理解你的問題並給予你回答。你也可以給予動物簡單的號令，只要不是明顯對自己有害、且牠們的智力足以理解的命令牠們都會聽從，有必要時GM會要求社交判定。' },
                    { name: '超人之力', timing: '非戰鬥', cost: '1 關鍵字', desc: '你可以展現出超人般的怪力，讓你能做出諸如拉住行進中的車輛或舉起水泥護欄等行動，有必要時GM會要求體能判定。' }
                ],
                builtins: [
                    { name: '能力強化', timing: '常駐', cost: '–', desc: '選擇一個能力值，在呼喚出天啟武裝的期間，你的該能力值+2。', special: 'buffAbility' }
                ],
                extras: [
                    { name: '強化專精', timing: '常駐', cost: '–', desc: '你的能力強化效果改為你所選擇的能力值+3。', special: 'buffUpgrade' },
                    { name: '獸王當千', timing: '常駐', cost: '–', desc: '你所在的區域每有一個敵人，你的攻擊傷害就+2，如果你所在的區域敵人具有BOSS特性，你的攻擊傷害額外+6。', turn: { input: { label: '同區域敵人數', mult: 'flat', per: 2 }, note: '同區域有BOSS特性敵人時，傷害額外+6（用手動調整）。' } },
                    { name: '能力爆發', timing: '你的回合', cost: '1 行動力', desc: '直到你下回合開始，任意一個能力值+3。', turn: { abilityBuff: 3 } },
                    { name: '震地跺', timing: '你的回合', cost: '1 行動力', desc: '和你同區域的所有敵人受到1D6傷害，並得到【暈眩】。', turn: { note: '同區域所有敵人受到1D6傷害並得到【暈眩】（另行擲骰）。' } },
                    { name: '獸王的號召', timing: '任意', cost: '1 行動力', desc: '將至多三個位在你鄰接區域的敵人移動到你所在的區域。', turn: { note: '至多三個鄰接區域敵人移動至你所在區域。' } },
                    { name: '獸王的反擊', timing: '被攻擊時', cost: '1 行動力', desc: '你立刻對攻擊者進行一次攻擊，該次攻擊不可使用任何其他需消耗行動力的效果。', turn: { note: '反擊時不可使用其他需消耗行動力的效果。' } },
                    { name: '獸王加冕', timing: '你的回合', cost: '–', desc: '戰鬥中你或隊友合計打倒 6 個以上的敵人後，或戰場上只剩下一個敵人時可以使用，直到你的下回合開始，你的所有基本能力值+4。此效果一場戰鬥只能使用一次。', turn: { allAbilityBuff: 4, note: '一場戰鬥只能使用一次。' } },
                    { name: '獸王的諭令', timing: '進行攻擊時', cost: '–', desc: '戰鬥中你或隊友合計打倒 6 個以上的敵人後，或戰場上只剩下一個敵人時可以使用，你和你的隊友在本戰鬥中每合計打倒兩個敵人，你本回合就可以額外攻擊 1 次，這些額外攻擊不能使用任何需要支付行動力的效果。', turn: { note: '每合計打倒兩敵額外攻擊1次，額外攻擊不可用需行動力的效果。' } }
                ]
            },
            '利維坦': {
                hit: 0, dodge: 0, support: 2, hp: 50,
                talents: [
                    { name: '支配水域', timing: '非戰鬥', cost: '1 關鍵字', desc: '你可以自由控制你身邊的水——例如讓噴水池變成噴向特定目標的高壓水柱、讓游泳池的水變成衝過街道的波滔，GM認為必要時可以要求反應判定。' },
                    { name: '鋼鐵之軀', timing: '非戰鬥', cost: '1 關鍵字', desc: '能殺死一半人的情境——例如被車輛高速撞擊、闖入火場、被埋在倒塌的大樓底下等對你而言只是小菜一碟，你可以在任何正常人會受重傷甚至死亡的狀況下毫髮無傷，GM認為有必要時可以要求體能判定。' }
                ],
                builtins: [
                    { name: '掩護', timing: '見內文', cost: '1 行動力', desc: '每當和你距離一區域內的隊友被攻擊命中時，你可以消耗一點行動力，取消隊友所受到的傷害並改為由你受到傷害。' }
                ],
                extras: [
                    { name: '本能掩護', timing: '常駐', cost: '–', desc: '一戰鬥輪僅限一次，你的掩護能力可不消耗行動力使用。' },
                    { name: '噬血強化', timing: '常駐', cost: '–', desc: '每當你因為掩護而受到傷害時，你的下一個攻擊判定獲得【優勢 1】，此效果可以累計。', turn: { input: { label: '累計次數', mult: 'adv' } } },

            { num: '★6', name: '熾火擊', timing: '命中判定前', desc: '你下一次的攻擊傷害 +2D6，如果你的攻擊命中，則目標受到燃燒 1D6。', turn: { dmgDice: 2, note: '命中後目標【燃燒 1D6】。' } },
            { num: '★7', name: '爆雷擊', timing: '命中判定前', desc: '你下一次的攻擊傷害 +2D6，如果你的攻擊命中，則直到你的下回合開始為止，目標受到暈眩狀態。', turn: { dmgDice: 2, note: '命中後目標【暈眩】。' } },
            { num: '★8', name: '狂風擊', timing: '命中判定前', desc: '你下一次的攻擊傷害 +2D6，如果你的攻擊命中，將目標任意移動至多兩區域。', turn: { dmgDice: 2, note: '命中後移動目標至多兩區域。' } },
            { num: '★9', name: '愚者號令', timing: '你的回合', desc: '選擇至多三個目標，將他們任意移動兩個區域。' },
            { num: '★10', name: '時流導航', timing: '你的回合', desc: '指定一個與你同區域的敵人為目標，你和你的所有隊友可以立即對該敵人進行一次攻擊，該攻擊不可以使用需消耗行動力的效果。' },
            { num: '★11', name: '覺醒', timing: '任意', desc: '選擇一個已經結束回合的隊友，他視為還沒有行動過，並在當前行動順位結束後立刻開始他的回合。' },
            { num: '★12', name: '因果固定', timing: '任何判定後', desc: '你可以將該判定改為大成功或大失敗。' }
        ];

        // ============================================================
        // 資料庫：戰鬥特技
        // ============================================================
        const FEATS = [
            { name: '重傷攻擊', desc: '每當你命中判定觸發強擊時，對目標造成5點終極傷害，就算此次攻擊沒有命中此效果也會生效。' },
            { name: '致殘攻擊', desc: '每當你的命中判定觸發強擊時，指定被你攻擊的目標身上的一個非常駐的部位，直到你下回合開始，每次目標使用該部位將受到10點終極傷害，如果該部位是攻擊部位，他的命中判定有劣勢1。' },
            { name: '重整體勢', desc: '每當你的命中判定觸發強擊時，你回復5點耐久值。' },
            { name: '誘導行動', desc: '每當你的命中判定觸發強擊時，你將該敵人任意移動1區域。' }
        ];

        // ============================================================
        // 狀態管理與設定檔
        // ============================================================
        function esc(s) {
            return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        function defaultState() {
            return {
                name: '',
                abilities: { '體能': 1, '反應': 1, '心智': 1, '社交': 1 },
                hitAbility: '反應', dodgeAbility: '體能', dmgAbility: '',
                fate: 5, ap: 3,
                essence: '', talent: '', form: '',
                essenceExtras: [], formExtras: [],
                assigns: {}, buffAbility: '體能',
                statuses: {}, statusValues: {},
                turnOn: {}, turnInputs: {}, turnChoices: {},
                emblems: [], emblemOn: {}, feat: '',
                flightTargetNonFly: true,
                rengaMode: '', chargeAP: 0,
                assaultMode: '', assaultAbility: '體能', assaultRegions: 2, assaultDistance: 1,
                biteStacks: 0, biteAbility: '體能',
                manual: { hit: 0, adv: 0, dis: 0, dice: 0, flat: 0, dodge: 0 }
            };
        }

        const STORE_KEY = 'knightCalcProfiles';
        let store = { activeId: null, profiles: {} };
        let S = defaultState();
        let saveTimer = null;

        function loadStore() {
            try {
                const raw = localStorage.getItem(STORE_KEY);
                if (raw) store = JSON.parse(raw);
            } catch (e) {}
            if (!store.profiles || Object.keys(store.profiles).length === 0) {
                const id = 'p' + Date.now();
                store = { activeId: id, profiles: { [id]: defaultState() } };
            }
            if (!store.profiles[store.activeId]) store.activeId = Object.keys(store.profiles)[0];
            S = Object.assign(defaultState(), store.profiles[store.activeId]);
            S.manual = Object.assign(defaultState().manual, S.manual);
        }

        function saveNow() {
            clearTimeout(saveTimer); saveTimer = null;
            store.profiles[store.activeId] = S;
            try { localStorage.setItem(STORE_KEY, JSON.stringify(store)); } catch (e) {}
        }
        function save() { clearTimeout(saveTimer); saveTimer = setTimeout(saveNow, 300); }
        window.addEventListener('beforeunload', saveNow);
        document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') saveNow(); });

        function switchProfile(id) {
            saveNow();
            store.activeId = id;
            S = Object.assign(defaultState(), store.profiles[id]);
            S.manual = Object.assign(defaultState().manual, S.manual);
            renderAll();
        }
        function newProfile() {
            saveNow();
            const id = 'p' + Date.now();
            store.profiles[id] = defaultState();
            store.activeId = id;
            S = store.profiles[id];
            saveNow(); renderAll();
        }
        function duplicateProfile() {
            saveNow();
            const id = 'p' + Date.now();
            store.profiles[id] = JSON.parse(JSON.stringify(S));
            store.profiles[id].name = S.name + '（副本）';
            store.activeId = id;
            S = store.profiles[id];
            saveNow(); renderAll();
        }
        function deleteProfile() {
            if (Object.keys(store.profiles).length <= 1) { alert('至少需保留一個設定檔。'); return; }
            if (!confirm('確定要刪除設定檔「' + S.name + '」嗎？')) return;
            delete store.profiles[store.activeId];
            store.activeId = Object.keys(store.profiles)[0];
            S = Object.assign(defaultState(), store.profiles[store.activeId]);
            saveNow(); renderAll();
        }
        function exportProfiles() {
            const blob = new Blob([JSON.stringify(store, null, 2)], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = '騎士計算機設定_' + new Date().toISOString().slice(0, 10) + '.json';
            a.click();
            URL.revokeObjectURL(a.href);
        }
        function importProfiles() {
            const input = document.createElement('input');
            input.type = 'file'; input.accept = '.json';
            input.onchange = e => {
                const f = e.target.files[0];
                if (!f) return;
                const r = new FileReader();
                r.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (!data.profiles) throw 0;
                        if (confirm('確定要匯入嗎？這將覆蓋現有的所有設定檔。')) {
                            store = data; loadStoreFix(); saveNow(); renderAll();
                        }
                    } catch (_) { alert('匯入失敗：檔案格式錯誤'); }
                };
                r.readAsText(f);
            };
            input.click();
        }
        function loadStoreFix() {
            if (!store.profiles[store.activeId]) store.activeId = Object.keys(store.profiles)[0];
            S = Object.assign(defaultState(), store.profiles[store.activeId]);
            S.manual = Object.assign(defaultState().manual, S.manual);
        }

        // ============================================================
        // 取得目前持有的效果
        // ============================================================
        function essenceData() { return ESSENCES[S.essence] || null; }
        function formData() { return FORMS[S.form] || null; }

        function ownedEssenceEffects() {
            const e = essenceData();
            if (!e) return [];
            const owned = [...e.builtins];
            e.extras.forEach(x => { if (S.essenceExtras.includes(x.name)) owned.push(x); });
            ESSENCE_GENERIC.forEach(x => { if (S.essenceExtras.includes(x.name)) owned.push(x); });
            return owned;
        }
        function ownedFormEffects() {
            const f = formData();
            if (!f) return [];
            const owned = [...f.builtins];
            f.extras.forEach(x => { if (S.formExtras.includes(x.name)) owned.push(x); });
            FORM_GENERIC.forEach(x => { if (S.formExtras.includes(x.name)) owned.push(x); });
            return owned;
        }
        function allOwned() { return [...ownedEssenceEffects(), ...ownedFormEffects()]; }
        function owns(name) { return allOwned().some(x => x.name === name); }

        // ============================================================
        // 核心計算
        // ============================================================
        function effAbility(name) {
            if (!name) return 0;
            let v = S.abilities[name] || 0;
            // 能力強化／強化專精（貝西摩斯）
            if (owns('能力強化') && S.buffAbility === name) {
                v += owns('強化專精') ? 3 : 2;
            }
            // 能力爆發（回合，+3 任一能力）
            if (S.turnOn['能力爆發'] && S.turnChoices['能力爆發'] === name) v += 3;
            // 獸王加冕（回合，全能力+4）
            if (S.turnOn['獸王加冕']) v += 4;
            return v;
        }

        function assignBonus(key) { // key: 'hit'|'dodge'|'support'
            let n = 0;
            for (const eff of ['本質調整', '武裝調整']) {
                if (owns(eff) && Array.isArray(S.assigns[eff]) && S.assigns[eff].includes(key)) n += 1;
            }
            return n;
        }

        function rengaPenalty() {
            if (S.form !== '牙' || !S.rengaMode) return 0;
            const sharp = S.formExtras.includes('銳牙');
            if (S.rengaMode === '三連牙') return sharp ? -4 : -6;
            return sharp ? -2 : -3;
        }

        function calc() {
            const bd = { hit: [], dmg: [], adv: [], notes: [] };
            const e = essenceData(), f = formData();
            if (!e || !f) return null;

            // ---------- 命中 ----------
            let hit = 0;
            const ha = effAbility(S.hitAbility);
            hit += ha; bd.hit.push([S.hitAbility, ha]);
            if (e.hit) { hit += e.hit; bd.hit.push(['本質（' + S.essence + '）', e.hit]); }
            if (f.hit) { hit += f.hit; bd.hit.push(['型態（' + S.form + '）', f.hit]); }
            const ab = assignBonus('hit');
            if (ab) { hit += ab; bd.hit.push(['調整效果', ab]); }

            let adv = 0, dis = 0;

            // 連牙／三連牙
            const rp = rengaPenalty();
            if (rp) {
                hit += rp;
                bd.hit.push([S.rengaMode + (S.formExtras.includes('銳牙') ? '（銳牙）' : ''), rp]);
                bd.notes.push([S.rengaMode, S.rengaMode === '三連牙' ? '對同一目標攻擊三次。' : '對同一目標攻擊兩次。']);
                ownedFormEffects().forEach(x => { if (x.rengaNote) bd.notes.push([x.name, x.rengaNote]); });
            }

            // 突擊系
            let assaultDmg = 0;
            if (S.form === '角' && S.assaultMode) {
                const av = effAbility(S.assaultAbility);
                if (S.assaultMode === '突擊') assaultDmg = av;
                else if (S.assaultMode === '零式突貫') assaultDmg = av * 3;
                else if (S.assaultMode === '飛翔突') assaultDmg = av * Math.min(Math.max(S.assaultRegions, 2), 5);
                else if (S.assaultMode === '零式突貫．改') assaultDmg = av * Math.max(S.assaultDistance, 0);
                if (S.formExtras.includes('必中神槍')) { adv += 1; bd.adv.push(['必中神槍', 1]); bd.notes.push(['必中神槍', '失手可重擲一次。']); }
                ownedFormEffects().forEach(x => { if (x.assaultNote) bd.notes.push([x.name, x.assaultNote]); });
            }

            // 蓄力系
            let chargeDmg = 0, chargeDice = 0;
            if (S.form === '爪' && S.chargeAP > 0) {
                const n = S.chargeAP;
                const body = effAbility('體能');
                if (n === 1 && S.formExtras.includes('高速蓄力')) {
                    chargeDmg = body + 3;
                    adv += 1; bd.adv.push(['高速蓄力', 1]);
                } else {
                    chargeDmg = n * body;
                }
                if (n >= 3 && S.formExtras.includes('三段蓄力斬')) chargeDice = n;
                ownedFormEffects().forEach(x => { if (x.chargeNote) bd.notes.push([x.name, x.chargeNote]); });
            }

            // 通用回合效果（turn 定義）
            let dmgDice = 0, dmgFlat = 0, hitTurn = 0, dodgeTurn = 0, supportTurn = 0, rangeMaxTurn = 0;
            const turnSources = [];
            allOwned().forEach(x => {
                if (!x.turn) return;
                if (!S.turnOn[x.name]) return;
                const t = x.turn;
                if (t.hit) { hitTurn += t.hit; bd.hit.push([x.name, t.hit]); }
                if (t.dodge) dodgeTurn += t.dodge;
                if (t.support) supportTurn += t.support;
                if (t.adv) { adv += t.adv; bd.adv.push([x.name, t.adv]); }
                if (t.dis) { dis += t.dis; bd.adv.push([x.name, -t.dis]); }
                if (t.dmgDice) { dmgDice += t.dmgDice; bd.dmg.push([x.name, t.dmgDice + 'D6']); }
                if (t.rangeMax) rangeMaxTurn += t.rangeMax;
                if (t.abilityAdd) {
                    const ch = S.turnChoices[x.name] || t.abilityAdd[0];
                    const v = effAbility(ch);
                    dmgFlat += v; bd.dmg.push([x.name + '（' + ch + '）', v]);
                }
                if (t.input) {
                    const n = Math.max(0, S.turnInputs[x.name] || 0);
                    if (n > 0) {
                        if (t.input.mult === 'adv') { adv += n; bd.adv.push([x.name, n]); }
                        else if (t.input.mult === 'dice') { dmgDice += n; bd.dmg.push([x.name, n + 'D6']); }
                        else { const per = t.input.per || 1; dmgFlat += n * per; bd.dmg.push([x.name, n * per]); }
                    }
                }
                if (t.note) bd.notes.push([x.name, t.note]);
                if (t.abilityBuff) bd.notes.push([x.name, '所選能力+' + t.abilityBuff + '（已計入能力值）。']);
                if (t.allAbilityBuff) bd.notes.push([x.name, '全能力+' + t.allAbilityBuff + '（已計入能力值）。']);
                turnSources.push(x.name);
            });

            // 紋章
            EMBLEMS.forEach(em => {
                if (!S.emblemOn[em.name]) return;
                const t = em.turn || {};
                if (t.adv) { adv += t.adv; bd.adv.push(['紋章・' + em.name, t.adv]); }
                if (t.dmgDice) { dmgDice += t.dmgDice; bd.dmg.push(['紋章・' + em.name, t.dmgDice + 'D6']); }
                if (t.rangeMax) rangeMaxTurn += t.rangeMax;
                if (t.note) bd.notes.push(['紋章・' + em.name, t.note]);
                if (!em.turn) bd.notes.push(['紋章・' + em.name, em.desc]);
            });

            // 狀態影響
            STATUSES.forEach(st => {
                if (!S.statuses[st.name]) return;
                if (st.selfAttack) {
                    if (st.selfAttack.dis) { dis += st.selfAttack.dis; bd.adv.push(['狀態・' + st.name, -st.selfAttack.dis]); }
                    if (st.selfAttack.note) bd.notes.push(['狀態・' + st.name, st.selfAttack.note]);
                }
                if (st.special === 'flight') {
                    if (S.flightTargetNonFly) { adv += 1; bd.adv.push(['飛行（目標非飛行）', 1]); }
                    allOwned().forEach(x => { if (x.flightNote && S.essenceExtras.includes(x.name)) bd.notes.push([x.name, x.flightNote]); });
                }
            });

            hit += hitTurn;

            // 無盡咬
            if (S.form === '牙' && S.formExtras.includes('無盡咬') && S.biteStacks > 0) {
                const v = effAbility(S.biteAbility) * S.biteStacks;
                dmgFlat += v;
                bd.dmg.push(['無盡咬 ×' + S.biteStacks + '（' + S.biteAbility + '）', v]);
            }

            // 手動調整
            if (S.manual.hit) { hit += Number(S.manual.hit); bd.hit.push(['手動', Number(S.manual.hit)]); }
            if (S.manual.adv) { adv += Number(S.manual.adv); bd.adv.push(['手動優勢', Number(S.manual.adv)]); }
            if (S.manual.dis) { dis += Number(S.manual.dis); bd.adv.push(['手動劣勢', -Number(S.manual.dis)]); }

            // ---------- 傷害 ----------
            let baseDice = f.dice;
            let dmgAbilityVal = effAbility(S.dmgAbility);
            let baseLabel = '型態基礎';
            if (owns('雙腕')) { baseDice = 1; dmgAbilityVal = effAbility('體能'); baseLabel = '雙腕基礎'; bd.notes.push(['雙腕', '可消耗1行動力多攻擊一次（第二擊劣勢1、命中−2）。']); }
            let zeroBase = false;
            if (S.form === '觸手' && S.turnOn['多體束縛']) { zeroBase = true; bd.notes.push(['多體束縛', '對三個目標範圍攻擊，基本傷害改為0。']); }

            let totalDice = 0, totalFlat = 0;
            if (!zeroBase) {
                totalDice += baseDice; bd.dmg.unshift([baseLabel, baseDice + 'D6']);
                totalFlat += dmgAbilityVal;
                bd.dmg.splice(1, 0, [S.dmgAbility || '能力', dmgAbilityVal]);
            } else {
                bd.dmg.unshift(['多體束縛', '基本傷害0']);
            }

            // 常駐 passive
            allOwned().forEach(x => {
                if (!x.passive) return;
                if (x.passive.dmgDice) { totalDice += x.passive.dmgDice; bd.dmg.push([x.name, x.passive.dmgDice + 'D6']); }
                if (x.passive.dmgFlat) { totalFlat += x.passive.dmgFlat; bd.dmg.push([x.name, x.passive.dmgFlat]); }
            });

            // 槍型武藝
            if (S.form === '吐息' && S.turnOn['槍型武藝'] && S.formExtras.includes('槍型武藝')) {
                const v = effAbility('體能') + effAbility('反應');
                totalFlat += v; bd.dmg.push(['槍型武藝（體能+反應）', v]);
            }

            totalDice += dmgDice + chargeDice;
            if (chargeDice) bd.dmg.push(['三段蓄力斬 ×' + S.chargeAP, chargeDice + 'D6']);
            totalFlat += dmgFlat;
            if (chargeDmg) { totalFlat += chargeDmg; bd.dmg.push(['蓄力 ×' + S.chargeAP + (S.chargeAP === 1 && S.formExtras.includes('高速蓄力') ? '（高速）' : ''), chargeDmg]); }
            if (assaultDmg) { totalFlat += assaultDmg; bd.dmg.push([S.assaultMode + '（' + S.assaultAbility + '）', assaultDmg]); }
            if (S.manual.dice) { totalDice += Number(S.manual.dice); bd.dmg.push(['手動', Number(S.manual.dice) + 'D6']); }
            if (S.manual.flat) { totalFlat += Number(S.manual.flat); bd.dmg.push(['手動', Number(S.manual.flat)]); }

            // ---------- 其他數值 ----------
            let dodge = effAbility(S.dodgeAbility) + 7 + e.dodge + f.dodge + assignBonus('dodge') + dodgeTurn + Number(S.manual.dodge || 0);
            let support = effAbility('社交') + e.support + f.support + assignBonus('support') + supportTurn;
            let init = Math.floor((effAbility('反應') + effAbility('心智')) / 2);
            let hp = e.hp;
            allOwned().forEach(x => { if (x.passive && x.passive.hp) hp += x.passive.hp; });

            // 射程
            let rangeStr = f.range;
            allOwned().forEach(x => { if (x.passive && x.passive.rangeSet) rangeStr = x.passive.rangeSet; });
            let [rMin, rMax] = rangeStr.split('～').map(Number);
            allOwned().forEach(x => { if (x.passive && x.passive.rangeMax) rMax += x.passive.rangeMax; });
            rMax += rangeMaxTurn;
            if (S.form === '爪' && S.chargeAP > 0 && S.formExtras.includes('蓄力延勢斬')) rMax += 1;
            if (S.form === '角' && S.assaultMode === '零式突貫．改') rMax += 2;

            // 持有型提醒
            allOwned().forEach(x => { if (x.note) bd.notes.push([x.name, x.note]); });
            if (S.feat) {
                const ft = FEATS.find(z => z.name === S.feat);
                if (ft) bd.notes.push(['戰鬥特技・' + ft.name, ft.desc]);
            }
            // 狀態解除提醒（負面且勾選中）
            STATUSES.forEach(st => {
                if (S.statuses[st.name] && !st.selfAttack && st.type === 'negative') {
                    bd.notes.push(['狀態・' + st.name, '解除條件：' + st.release]);
                }
            });

            const net = adv - dis;
            const hitDice = net > 0 ? (2 + net) + 'B6' : net < 0 ? (2 - net) + 'W6' : '2D6';
            const hitStr = hitDice + (hit >= 0 ? '+' + hit : String(hit));
            const dmgStr = totalDice > 0
                ? totalDice + 'D6' + (totalFlat > 0 ? '+' + totalFlat : totalFlat < 0 ? String(totalFlat) : '')
                : String(totalFlat);

            return { hit, adv, dis, net, hitStr, dmgStr, totalDice, totalFlat, dodge, support, init, hp, rMin, rMax, bd };
        }

        // ============================================================
        // 渲染
        // ============================================================
        function fmtMod(n) { return n >= 0 ? '+' + n : String(n); }

        function renderProfileBar() {
            const sel = document.getElementById('profileSelect');
            sel.innerHTML = '';
            Object.entries(store.profiles).forEach(([id, p]) => {
                const o = document.createElement('option');
                o.value = id; o.textContent = p.name || '（未命名）';
                if (id === store.activeId) o.selected = true;
                sel.appendChild(o);
            });
            document.getElementById('charName').value = S.name;
        }

        function renderAbilities() {
            const g = document.getElementById('abilityGrid');
            g.innerHTML = ABILITIES.map(a => `
                <div class="ability-cell">
                    <label>${a}</label>
                    <input type="number" value="${S.abilities[a]}" min="0" onchange="setAbility('${a}', this.value)">
                </div>
            `).join('');
            fillSelect('hitAbilitySel', ['體能', '反應', '心智'], S.hitAbility);
            fillSelect('dodgeAbilitySel', ['體能', '反應', '心智'], S.dodgeAbility);
            document.getElementById('fateInput').value = S.fate;
            document.getElementById('apInput').value = S.ap;
        }

        function fillSelect(id, options, current, emptyLabel) {
            const sel = document.getElementById(id);
            sel.innerHTML = options.map(o => `<option value="${esc(o)}" ${o === current ? 'selected' : ''}>${o === '' ? esc(emptyLabel || '－') : esc(o)}</option>`).join('');
        }

        function effectRow(x, opts) {
            const checked = opts.checked ? 'checked' : '';
            const cls = opts.builtin ? 'effect-item builtin' : 'effect-item';
            const ctrl = opts.builtin
                ? ''
                : `<input type="checkbox" ${checked} onchange="${opts.handler}('${esc(x.name)}', this.checked)">`;
            let extra = '';
            if (x.special === 'assign2' && opts.checked !== false && (opts.builtin || opts.checked)) {
                extra = assignControls(x.name);
            }
            if (x.special === 'buffAbility' || (x.special === 'buffUpgrade' && opts.checked)) {
                if (x.special === 'buffAbility') extra = buffControls();
            }
            return `
                <div class="${cls}">
                    ${ctrl}
                    <div class="effect-main">
                        <span class="effect-name">${esc(x.name)}</span>
                        <span class="effect-meta">${esc(x.timing)}｜${esc(x.cost)}</span>
                        <div class="effect-desc">${esc(x.desc)}</div>
                        ${extra}
                    </div>
                </div>`;
        }

        function assignControls(effName) {
            const cur = S.assigns[effName] || [];
            return `<div style="margin-top:4px;font-size:12px">分配＋1（限兩項）：` +
                ['hit', 'dodge', 'support'].map(k => {
                    const label = { hit: '命中', dodge: '迴避', support: '支援' }[k];
                    return `<label style="margin-right:10px"><input type="checkbox" ${cur.includes(k) ? 'checked' : ''}
                        onchange="toggleAssign('${esc(effName)}', '${k}', this.checked)"> ${label}</label>`;
                }).join('') + `</div>`;
        }

        function buffControls() {
            return `<div style="margin-top:4px;font-size:12px">強化的能力值：<select onchange="setKey('buffAbility', this.value); refresh()">` +
                ABILITIES.map(a => `<option ${S.buffAbility === a ? 'selected' : ''}>${a}</option>`).join('') + `</select></div>`;
        }

        function renderEssence() {
            const e = essenceData();
            if (!e) {
                fillSelect('essenceSel', ['', ...Object.keys(ESSENCES)], '', '（選擇本質）');
                document.getElementById('essenceStatsLabel').textContent = '';
                document.getElementById('essenceContent').innerHTML = '<div class="panel-body hint">請先選擇本質。</div>';
                return;
            }
            fillSelect('essenceSel', ['', ...Object.keys(ESSENCES)], S.essence, '（選擇本質）');
            document.getElementById('essenceStatsLabel').textContent =
                `命中${fmtMod(e.hit)}　迴避${fmtMod(e.dodge)}　支援${fmtMod(e.support)}　耐久${e.hp}`;
            let html = '';
            html += `<details open><summary>本質天賦（擇一）</summary><div class="details-body">`;
            html += e.talents.map(t => `
                <div class="effect-item">
                    <input type="radio" name="talent" ${S.talent === t.name ? 'checked' : ''} onchange="setKey('talent', '${esc(t.name)}'); refresh()">
                    <div class="effect-main">
                        <span class="effect-name">${esc(t.name)}</span>
                        <span class="effect-meta">${esc(t.timing)}｜${esc(t.cost)}</span>
                        <div class="effect-desc">${esc(t.desc)}</div>
                    </div>
                </div>`).join('');
            html += `</div></details>`;
            html += `<details open><summary>內建效果（自動獲得）</summary><div class="details-body">`;
            html += e.builtins.map(x => effectRow(x, { builtin: true })).join('');
            html += `</div></details>`;
            html += `<details open><summary>追加效果</summary><div class="details-body">`;
            html += e.extras.map(x => effectRow(x, { checked: S.essenceExtras.includes(x.name), handler: 'toggleEssenceExtra' })).join('');
            html += `<div style="border-top:1px solid var(--border-light);margin:8px 0 4px;padding-top:6px;font-size:11px;color:var(--text-muted)">泛用效果</div>`;
            html += ESSENCE_GENERIC.map(x => effectRow(x, { checked: S.essenceExtras.includes(x.name), handler: 'toggleEssenceExtra' })).join('');
            html += `</div></details>`;
            document.getElementById('essenceContent').innerHTML = html;
        }

        function renderForm() {
            const f = formData();
            if (!f) {
                fillSelect('formSel', ['', ...Object.keys(FORMS)], '', '（選擇型態）');
                fillSelect('dmgAbilitySel', [''], '');
                document.getElementById('formStatsLabel').textContent = '';
                document.getElementById('formContent').innerHTML = '<div class="panel-body hint">請先選擇型態。</div>';
                return;
            }
            fillSelect('formSel', ['', ...Object.keys(FORMS)], S.form, '（選擇型態）');
            fillSelect('dmgAbilitySel', f ? f.abilities : [''], S.dmgAbility);
            document.getElementById('formStatsLabel').textContent =
                `命中${fmtMod(f.hit)}　迴避${fmtMod(f.dodge)}　支援${fmtMod(f.support)}　射程${f.range}　傷害${f.dice}D6+能力`;
            let html = '';
            html += `<details open><summary>內建效果（自動獲得）</summary><div class="details-body">`;
            html += f.builtins.map(x => effectRow(x, { builtin: true })).join('');
            html += `</div></details>`;
            html += `<details open><summary>追加效果</summary><div class="details-body">`;
            html += f.extras.map(x => effectRow(x, { checked: S.formExtras.includes(x.name), handler: 'toggleFormExtra' })).join('');
            html += `<div style="border-top:1px solid var(--border-light);margin:8px 0 4px;padding-top:6px;font-size:11px;color:var(--text-muted)">泛用效果</div>`;
            html += FORM_GENERIC.map(x => effectRow(x, { checked: S.formExtras.includes(x.name), handler: 'toggleFormExtra' })).join('');
            html += `</div></details>`;
            document.getElementById('formContent').innerHTML = html;
        }

        function renderFate() {
            const used = S.essenceExtras.length + S.formExtras.length;
            let el = document.getElementById('fateStatus');
            if (!el) {
                el = document.createElement('div');
                el.id = 'fateStatus'; el.className = 'fate-status';
                const panel = document.querySelector('.col-build .panel');
                panel.appendChild(el);
            }
            el.textContent = `追加效果已選 ${used}／命運點 ${S.fate}`;

        }

        function renderFeat() {
            const sel = document.getElementById('featSel');
            sel.innerHTML = `<option value="">（無）</option>` + FEATS.map(x =>
                `<option value="${esc(x.name)}" ${S.feat === x.name ? 'selected' : ''}>${esc(x.name)}</option>`).join('');

            document.getElementById('featDesc').textContent = ft ? ft.desc : '';

        // ----- 戰鬥面板 -----
        function renderTurnEffects() {
            let html = '';

            // 牙：連牙模式
            if (S.form === '牙') {
                const sharp = S.formExtras.includes('銳牙');
                html += `<div class="turn-row"><b>連牙</b>
                    <label><input type="radio" name="renga" ${!S.rengaMode ? 'checked' : ''} onchange="setKey('rengaMode',''); refresh()"> 不使用</label>
                    <label><input type="radio" name="renga" ${S.rengaMode === '連牙' ? 'checked' : ''} onchange="setKey('rengaMode','連牙'); refresh()"> 連牙（命中${sharp ? '−2' : '−3'}・2次攻擊）</label>
                    ${S.formExtras.includes('三連牙') ? `<label><input type="radio" name="renga" ${S.rengaMode === '三連牙' ? 'checked' : ''} onchange="setKey('rengaMode','三連牙'); refresh()"> 三連牙（命中${sharp ? '−4' : '−6'}・3次攻擊）</label>` : ''}
                </div>`;
                if (S.formExtras.includes('無盡咬')) {
                    html += `<div class="turn-row"><b>無盡咬累積</b>
                        <input type="number" min="0" value="${S.biteStacks}" onchange="setNum('biteStacks', this.value); refresh()"> 次 ×
                        <select onchange="setKey('biteAbility', this.value); refresh()">
                            ${['體能', '反應'].map(a => `<option ${S.biteAbility === a ? 'selected' : ''}>${a}</option>`).join('')}
                        </select></div>`;
                }
            }

            // 爪：蓄力
            if (S.form === '爪') {
                html += `<div class="turn-row"><b>蓄力</b> 投入行動力
                    <input type="number" min="0" value="${S.chargeAP}" onchange="setNum('chargeAP', this.value); refresh()">
                    <span class="t-meta">每點+體能${S.formExtras.includes('高速蓄力') ? '；僅1點時+體能+3且優勢1' : ''}${S.formExtras.includes('三段蓄力斬') ? '；3點以上每點再+1D6' : ''}</span>
                </div>`;
            }

            // 角：突擊
            if (S.form === '角') {
                const modes = ['突擊'];
                if (S.formExtras.includes('零式突貫')) modes.push('零式突貫');
                if (S.formExtras.includes('飛翔突')) modes.push('飛翔突');
                if (S.formExtras.includes('零式突貫．改')) modes.push('零式突貫．改');
                html += `<div class="turn-row"><b>突擊</b>
                    <label><input type="radio" name="assault" ${!S.assaultMode ? 'checked' : ''} onchange="setKey('assaultMode',''); refresh()"> 不使用</label>
                    ${modes.map(m => `<label><input type="radio" name="assault" ${S.assaultMode === m ? 'checked' : ''} onchange="setKey('assaultMode','${m}'); refresh()"> ${m}</label>`).join('')}
                    <select onchange="setKey('assaultAbility', this.value); refresh()">
                        ${['體能', '反應'].map(a => `<option ${S.assaultAbility === a ? 'selected' : ''}>${a}</option>`).join('')}
                    </select>`;
                if (S.assaultMode === '飛翔突') html += ` 移動區域數 <input type="number" min="2" max="5" value="${S.assaultRegions}" onchange="setNum('assaultRegions', this.value); refresh()">`;
                if (S.assaultMode === '零式突貫．改') html += ` 與敵距離 <input type="number" min="0" value="${S.assaultDistance}" onchange="setNum('assaultDistance', this.value); refresh()">`;
                html += `</div>`;
            }

            // 通用 turn 效果
            allOwned().forEach(x => {
                if (!x.turn) return;
                const t = x.turn;
                const on = !!S.turnOn[x.name];
                let row = `<div class="turn-row">
                    <label><input type="checkbox" ${on ? 'checked' : ''} onchange="toggleTurn('${esc(x.name)}', this.checked)"> <b>${esc(x.name)}</b></label>
                    <span class="t-meta">${esc(x.timing)}｜${esc(x.cost)}</span>`;
                const effects = [];
                if (t.hit) effects.push('命中' + fmtMod(t.hit));
                if (t.adv) effects.push('優勢' + t.adv);
                if (t.dis) effects.push('劣勢' + t.dis);
                if (t.dmgDice) effects.push('傷害+' + t.dmgDice + 'D6');
                if (t.rangeMax) effects.push('射程+' + t.rangeMax);
                if (t.abilityBuff) effects.push('能力+' + t.abilityBuff);
                if (t.allAbilityBuff) effects.push('全能力+' + t.allAbilityBuff);
                if (effects.length) row += `<span class="t-effect">${effects.join('　')}</span>`;
                if (t.label) row += `<span class="t-meta">（${esc(t.label)}）</span>`;
                if (on && t.abilityBuff) {
                    row += ` <select onchange="setTurnChoice('${esc(x.name)}', this.value)">` +
                        ABILITIES.map(a => `<option ${(S.turnChoices[x.name] || '體能') === a ? 'selected' : ''}>${a}</option>`).join('') + `</select>`;
                }
                if (on && t.abilityAdd) {
                    row += ` <select onchange="setTurnChoice('${esc(x.name)}', this.value)">` +
                        t.abilityAdd.map(a => `<option ${(S.turnChoices[x.name] || t.abilityAdd[0]) === a ? 'selected' : ''}>${a}</option>`).join('') + `</select>`;
                }
                if (on && t.input) {
                    row += ` ${esc(t.input.label)} <input type="number" min="0" value="${S.turnInputs[x.name] || 0}"
                        onchange="setTurnInput('${esc(x.name)}', this.value)">`;
                }
                row += `</div>`;
                html += row;
            });

            if (!html) html = '<div class="hint">' + (S.essence && S.form ? '目前的構成沒有可在回合中使用的效果。' : '請先選擇本質與型態。') + '</div>';
            document.getElementById('turnEffects').innerHTML = html;
        }

        function renderStatuses() {
            const g = document.getElementById('statusGrid');
            g.innerHTML = STATUSES.map(st => {
                const on = !!S.statuses[st.name];
                let row = `<div class="status-item">
                    <input type="checkbox" ${on ? 'checked' : ''} onchange="toggleStatus('${esc(st.name)}', this.checked)">
                    <span class="s-name ${st.type}">${esc(st.name)}${st.hasValue ? (st.isDice ? ' nD6' : ' n') : ''}</span>`;
                if (st.hasValue && on) {
                    row += `<input type="number" min="1" value="${S.statusValues[st.name] || 1}" onchange="setStatusValue('${esc(st.name)}', this.value)">${st.isDice ? 'D6' : ''}`;
                }
                if (st.special === 'flight' && on) {
                    row += `<label style="font-size:11px"><input type="checkbox" ${S.flightTargetNonFly ? 'checked' : ''} onchange="setBool('flightTargetNonFly', this.checked)"> 目標非飛行</label>`;
                }
                row += `<span class="status-tooltip">${esc(st.desc)}\n解除條件：${esc(st.release)}</span></div>`;
                return row;
            }).join('');
        }

        function renderEmblems() {
            const owned = EMBLEMS.filter(em => S.emblems.includes(em.name));
            document.getElementById('emblemList').innerHTML = owned.length
                ? owned.map(em => `
                    <div class="turn-row">
                        <label><input type="checkbox" ${S.emblemOn[em.name] ? 'checked' : ''} onchange="toggleEmblem('${esc(em.name)}', this.checked)">
                        <b>${esc(em.num)}　${esc(em.name)}</b></label>
                        <span class="t-meta">${esc(em.timing)}</span>
                        <span class="effect-desc" style="flex-basis:100%;margin-left:24px">${esc(em.desc)}</span>
                    </div>`).join('')
                : '<div class="hint">尚未持有紋章，請在左側「紋章（持有）」面板勾選。</div>';
        }

        function renderOwnedSummary() {
            const el = document.getElementById('ownedSummary');
            const e = essenceData(), f = formData();
            if (!e || !f) { el.innerHTML = '<div class="hint">請先選擇本質與型態。</div>'; return; }

            const sections = [];
            function group(title, items) {
                if (!items.length) return;
                sections.push(`<div style="border-top:1px solid var(--border-light);margin:8px 0 4px;padding-top:6px;font-size:11px;color:var(--text-muted)">${esc(title)}</div>` +
                    items.map(x => `
                        <div class="effect-item">
                            <div class="effect-main">
                                <span class="effect-name">${esc(x.name)}</span>
                                <span class="effect-meta">${esc(x.timing || '')}${x.cost ? '｜' + esc(x.cost) : ''}</span>
                                <div class="effect-desc">${esc(x.desc)}</div>
                            </div>
                        </div>`).join(''));
            }

            const talent = e.talents.find(t => t.name === S.talent);
            group('本質天賦', talent ? [talent] : []);
            group('本質內建效果', e.builtins);
            group('本質追加效果', [...e.extras, ...ESSENCE_GENERIC].filter(x => S.essenceExtras.includes(x.name)));
            group('型態內建效果', f.builtins);
            group('型態追加效果', [...f.extras, ...FORM_GENERIC].filter(x => S.formExtras.includes(x.name)));
            group('紋章', EMBLEMS.filter(em => S.emblems.includes(em.name)).map(em => ({ name: em.num + '　' + em.name, timing: em.timing, cost: '', desc: em.desc })));
            const ft = FEATS.find(x => x.name === S.feat);
            group('戰鬥特技', ft ? [{ name: ft.name, timing: '', cost: '', desc: ft.desc }] : []);

            el.innerHTML = sections.length ? sections.join('') : '<div class="hint">尚未持有任何效果。</div>';
        }

        function renderEmblemOwn() {
            document.getElementById('emblemOwnList').innerHTML = EMBLEMS.map(em => `
                <div class="effect-item">
                    <input type="checkbox" ${S.emblems.includes(em.name) ? 'checked' : ''} onchange="toggleEmblemOwn('${esc(em.name)}', this.checked)">
                    <div class="effect-main">
                        <span class="effect-name">${esc(em.num)}　${esc(em.name)}</span>
                        <span class="effect-meta">${esc(em.timing)}</span>
                        <div class="effect-desc">${esc(em.desc)}</div>
                    </div>
                </div>`).join('');
        }

        function renderManual() {
            const fields = [['hit', '命中±'], ['adv', '優勢+'], ['dis', '劣勢+'], ['dice', '傷害D6±'], ['flat', '傷害固定±'], ['dodge', '迴避±']];
            document.getElementById('manualGrid').innerHTML = fields.map(([k, label]) => `
                <div class="manual-cell"><label>${label}</label>
                <input type="number" value="${S.manual[k] || 0}" onchange="setManual('${k}', this.value)"></div>`).join('');
        }

        function renderOutput() {
            const r = calc();
            if (!r) {
                document.getElementById('hitOutput').textContent = '——';
                document.getElementById('dmgOutput').textContent = '——';
                document.getElementById('hitSub').textContent = '';
                document.getElementById('dmgSub').textContent = '';
                document.getElementById('statCells').innerHTML = '';
                document.getElementById('breakdown').innerHTML = '<div>請先選擇本質與型態。</div>';
                document.getElementById('notesList').style.display = 'none';
                return;
            }
            document.getElementById('hitOutput').textContent = r.hitStr;
            document.getElementById('dmgOutput').textContent = r.dmgStr;
            document.getElementById('hitSub').textContent =
                r.net > 0 ? `優勢${r.net}：擲${2 + r.net}顆取高2顆` :
                r.net < 0 ? `劣勢${-r.net}：擲${2 - r.net}顆取低2顆` : '無優劣勢';
            document.getElementById('dmgSub').textContent = r.totalDice + '顆D6＋固定值' + r.totalFlat;

            document.getElementById('statCells').innerHTML = [
                ['迴避', r.dodge], ['支援', fmtMod(r.support)], ['先制', r.init],
                ['耐久', r.hp], ['射程', r.rMin + '～' + r.rMax], ['行動力', S.ap]
            ].map(([k, v]) => `<div class="stat-cell"><div class="v">${v}</div><div class="k">${k}</div></div>`).join('');

            const hitParts = r.bd.hit.map(([l, v]) => `${esc(l)}<b class="${v >= 0 ? 'pos' : 'neg'}">${fmtMod(v)}</b>`).join('　');
            const advParts = r.bd.adv.length ? '　｜　' + r.bd.adv.map(([l, v]) => `${esc(l)}<b class="${v >= 0 ? 'pos' : 'neg'}">${v >= 0 ? '優勢+' + v : '劣勢' + v}</b>`).join('　') : '';
            const dmgParts = r.bd.dmg.map(([l, v]) => `${esc(l)}<b>${typeof v === 'number' ? fmtMod(v) : '+' + v}</b>`).join('　');
            document.getElementById('breakdown').innerHTML =
                `<div>命中明細：${hitParts}${advParts}</div><div>傷害明細：${dmgParts}</div>`;

            const notesEl = document.getElementById('notesList');
            if (r.bd.notes.length) {
                notesEl.style.display = 'block';
                notesEl.innerHTML = r.bd.notes.map(([src, txt]) =>
                    `<li><span class="note-src">${esc(src)}：</span>${esc(txt)}</li>`).join('');
            } else {
                notesEl.style.display = 'none';
            }
        }

        function renderAll() {
            renderProfileBar();
            renderAbilities();
            renderEssence();
            renderForm();
            renderFate();
            renderFeat();
            renderEmblemOwn();
            renderBattle();
        }
        function renderBattle() {
            renderOwnedSummary();
            renderTurnEffects();
            renderStatuses();
            renderEmblems();
            renderManual();
            renderOutput();
        }
        function refresh() { renderBattle(); renderFate(); save(); }

        // ============================================================
        // 事件處理
        // ============================================================
        function onNameInput(v) { S.name = v; save(); renderProfileBarNameOnly(); }
        function renderProfileBarNameOnly() {
            const sel = document.getElementById('profileSelect');
            const opt = sel.querySelector('option[value="' + store.activeId + '"]');
            if (opt) opt.textContent = S.name || '（未命名）';
        }
        function setAbility(a, v) { S.abilities[a] = parseInt(v) || 0; refresh(); }
        function setKey(k, v) { S[k] = v; save(); }
        function setNum(k, v) { S[k] = parseInt(v) || 0; refresh(); }
        function setBool(k, v) { S[k] = !!v; refresh(); }
        function setManual(k, v) { S.manual[k] = parseInt(v) || 0; renderOutput(); save(); }
        function setEssence(name) {
            S.essence = name;
            S.essenceExtras = [];
            S.talent = name && ESSENCES[name] ? ESSENCES[name].talents[0].name : '';
            S.turnOn = {}; S.turnInputs = {}; S.turnChoices = {};
            renderAll(); save();
        }
        function setForm(name) {
            S.form = name;
            S.formExtras = [];
            if (!name || !FORMS[name]) { S.dmgAbility = ''; }
            else if (!FORMS[name].abilities.includes(S.dmgAbility)) S.dmgAbility = FORMS[name].abilities[0];
            S.rengaMode = ''; S.chargeAP = 0; S.assaultMode = ''; S.biteStacks = 0;
            S.turnOn = {}; S.turnInputs = {}; S.turnChoices = {};
            renderAll(); save();
        }
        function toggleEssenceExtra(name, on) {
            S.essenceExtras = S.essenceExtras.filter(n => n !== name);
            if (on) S.essenceExtras.push(name);
            renderEssence(); refresh();
        }
        function toggleFormExtra(name, on) {
            S.formExtras = S.formExtras.filter(n => n !== name);
            if (on) S.formExtras.push(name);
            if (!on) {
                if (name === '三連牙' && S.rengaMode === '三連牙') S.rengaMode = '';
                if (name === '無盡咬') S.biteStacks = 0;
            }
            renderForm(); refresh();
        }
        function toggleAssign(effName, key, on) {
            let cur = S.assigns[effName] || [];
            cur = cur.filter(k => k !== key);
            if (on) {
                if (cur.length >= 2) { alert('最多只能分配兩項。'); renderEssence(); renderForm(); return; }
                cur.push(key);
            }
            S.assigns[effName] = cur;
            renderEssence(); renderForm(); refresh();
        }
        function toggleTurn(name, on) { S.turnOn[name] = on; refresh(); }
        function setTurnInput(name, v) { S.turnInputs[name] = parseInt(v) || 0; renderOutput(); save(); }
        function setTurnChoice(name, v) { S.turnChoices[name] = v; renderOutput(); save(); }
        function toggleStatus(name, on) { S.statuses[name] = on; refresh(); }
        function setStatusValue(name, v) { S.statusValues[name] = parseInt(v) || 1; renderOutput(); save(); }
        function toggleEmblem(name, on) { S.emblemOn[name] = on; refresh(); }
        function toggleEmblemOwn(name, on) {
            S.emblems = S.emblems.filter(n => n !== name);
            if (on) S.emblems.push(name);
            else delete S.emblemOn[name];
            renderEmblemOwn(); refresh();
        }

        function resetTurn() {
            S.turnOn = {}; S.turnInputs = {}; S.emblemOn = {};
            S.rengaMode = ''; S.chargeAP = 0; S.assaultMode = ''; S.biteStacks = 0;
            S.manual = defaultState().manual;
            refresh();
        }

        function copyOutput(which, e) {
            const text = document.getElementById(which === 'hit' ? 'hitOutput' : 'dmgOutput').textContent;
            const btn = e ? e.target : null;
            const done = () => {
                if (btn) {
                    const t = btn.textContent;
                    btn.textContent = '已複製';
                    setTimeout(() => { btn.textContent = t; }, 1000);
                }
            };
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).then(done).catch(() => {});
            } else {
                const ta = document.createElement('textarea');
                ta.value = text; ta.style.position = 'fixed'; ta.style.left = '-9999px';
                document.body.appendChild(ta); ta.select();
                try { document.execCommand('copy'); done(); } catch (_) {}
                document.body.removeChild(ta);
            }
        }

        // ============================================================
        // 初始化與主題同步
        // ============================================================
        loadStore();
        renderAll();

        (function () {
            function applyTheme(t) {
                if (t === 'dark') document.documentElement.dataset.theme = 'dark';
                else delete document.documentElement.dataset.theme;
            }
            try { applyTheme(localStorage.getItem('toolbox-theme') || 'light'); } catch (e) {}
            window.addEventListener('message', function (e) {
                if (e.data && e.data.type === 'toolbox-theme') applyTheme(e.data.theme);
            });
        })();
    </script>
</body>
</html>
